<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rocket Trajectory</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #d1d5db;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('https://images.unsplash.com/photo-1564053489984-317bde2340d3?w=1200&q=80') no-repeat center;
      background-size: cover;
      background-attachment: fixed;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }
    .start-screen {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: radial-gradient(circle at 20% 50%, rgba(59, 130, 246, 0.2) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                  linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
      color: white;
    }
    .start-screen h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 42px;
      margin: 0 0 16px 0;
      background: linear-gradient(120deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .start-btn {
      margin-top: 40px;
      padding: 16px 40px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    .start-btn:hover {
      background: #2563eb;
    }
    .app {
      display: none;
      padding: 20px;
      max-width: 900px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    h2 { color: #e0e0e0; margin-top: 30px; }
    input, button {
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      border-radius: 12px;
      font-size: 17px;
      box-sizing: border-box;
    }
    input {
      background: #1f242e;
      border: 1px solid #4b5563;
      color: white;
    }
    button {
      background: #2563eb;
      color: white;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    button:hover {
      background: #1d4ed8;
    }
    .graph-container {
      display: grid;
      grid-template-columns: 1fr 250px;
      gap: 20px;
      margin-top: 20px;
      align-items: start;
    }
    .graph-wrapper {
      display: flex;
      flex-direction: column;
    }
    .stats-box {
      background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 20px;
      height: fit-content;
      position: sticky;
      top: 20px;
      max-height: 600px;
      overflow-y: auto;
    }
    .stats-box h4 {
      margin: 0 0 15px 0;
      color: #60a5fa;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .stat-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 12px 0;
      border-bottom: 1px solid #2d3748;
    }
    .stat-item:last-child {
      border-bottom: none;
    }
    .stat-label {
      color: #9ca3af;
      font-size: 13px;
      min-width: 110px;
    }
    .stat-value {
      color: #60a5fa;
      font-weight: 600;
      font-size: 15px;
      text-align: right;
    }
    .stat-suggestion {
      color: #4ade80;
      font-size: 12px;
      font-weight: 500;
      margin-top: 3px;
    }
    .formula {
      background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
      border: 1px solid #374151;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
    }
    .fuel-box {
      background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
      border: 1px solid #374151;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
    }
    .fuel-box h3 {
      margin: 0 0 15px 0;
      color: #fbbf24;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .fuel-mixture-item {
      background: rgba(251, 191, 36, 0.05);
      border-left: 3px solid #fbbf24;
      padding: 15px;
      border-radius: 8px;
      margin: 12px 0;
    }
    .mixture-label {
      color: #fbbf24;
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 5px;
    }
    .mixture-ratio {
      display: flex;
      gap: 20px;
      margin: 10px 0;
    }
    .ratio-item {
      flex: 1;
    }
    .ratio-label {
      color: #9ca3af;
      font-size: 12px;
      margin-bottom: 5px;
    }
    .ratio-value {
      color: #60a5fa;
      font-weight: 600;
      font-size: 16px;
    }
    .mixture-note {
      color: #9ca3af;
      font-size: 12px;
      margin-top: 8px;
      line-height: 1.5;
    }
    .formula h3 {
      margin: 0 0 15px 0;
      color: #60a5fa;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .formula p {
      margin: 10px 0;
      color: #d1d5db;
      font-size: 14px;
      line-height: 1.6;
    }
    .formula small {
      display: block;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #2d3748;
    }
    @media (max-width: 768px) {
      .graph-container {
        grid-template-columns: 1fr;
      }
      .stats-box {
        position: static;
      }
    }
    canvas {
      width: 100%;
      height: 380px;
      background: #ffffff;
      border-radius: 12px;
      margin-top: 16px;
      border: 1px solid #e5e7eb;
      display: block;
    }
  </style>
</head>
<body>

  <!-- Start Screen -->
  <div class="start-screen" id="startScreen">
    <h1>ROCKET TRAJECTORY</h1>
    <p style="font-size:18px; max-width:280px;">Calculate mission feasibility for your rocket</p>
    <button class="start-btn" onclick="startApp()">START CALCULATOR</button>
  </div>

  <!-- Main App -->
  <div class="app" id="mainApp">
    <h2 style="text-align:center;">Mission Parameters</h2>
    
    <input type="number" id="fuel" placeholder="Fuel Amount (kg)" />
    <input type="number" id="distance" placeholder="Target Distance (km)" />
    
    <button onclick="calculate()">CALCULATE TRAJECTORY</button>
    
    <div class="graph-container">
      <div class="graph-wrapper">
        <canvas id="graph"></canvas>
      </div>
      <div class="stats-box" id="statsBox"></div>
    </div>

    <div class="fuel-box" id="fuelBox" style="display: none;">
      <h3>⛽ FUEL MIXTURE RECOMMENDATION</h3>
      <div id="fuelContent"></div>
    </div>

    <div class="formula">
      <h3 style="margin-top:0;">How it's Calculated</h3>
      <p><strong>Rocket Equation:</strong> Δv = vₑ × ln(m₀/mf)</p>
      <p><strong>Max Altitude:</strong> (Δv²) / (2g)</p>
      <p><strong>Flight Time:</strong> Distance / (Δv × efficiency)</p>
      <small style="color:#9ca3af;">g = 9.81 m/s² | vₑ = 3000 m/s (approx)</small>
    </div>
  </div>

  <script>
    function startApp() {
      document.getElementById('startScreen').style.display = 'none';
      document.getElementById('mainApp').style.display = 'block';
    }

    function calculate() {
      const fuel = parseFloat(document.getElementById('fuel').value);
      const distance = parseFloat(document.getElementById('distance').value);
      const statsBox = document.getElementById('statsBox');
      
      if (!fuel || !distance || fuel <= 0 || distance <= 0) {
        statsBox.innerHTML = "<strong style='color:#f87171'>Please enter valid positive numbers.</strong>";
        return;
      }

      // ===== Realistic Rocket Physics =====
const g0 = 9.81;              // Gravity (m/s²)
const Isp = 350;              // Engine specific impulse (seconds)
const dryMass = 1000;         // Rocket dry mass (kg)

const fuelMass = fuel;
const initialMass = dryMass + fuelMass;
const finalMass = dryMass;

// Tsiolkovsky Rocket Equation
const deltaV = Isp * g0 * Math.log(initialMass / finalMass);

// Approximate vertical altitude (vacuum, no drag)
const maxAlt = (deltaV * deltaV) / (2 * g0) / 1000;

// Approximate total flight time
const time = (2 * deltaV) / g0;

      let status;

if (deltaV >= 9400) {
    status = "ORBIT POSSIBLE";
} else if (deltaV >= 5000) {
    status = "SUBORBITAL";
} else if (deltaV >= 2500) {
    status = "HIGH ALTITUDE";
} else {
    status = "INSUFFICIENT ΔV";
}

      // Generate suggestions based on values
      let fuelSuggestion = fuel < 500 ? "Low fuel - risky mission" : fuel < 1000 ? "Moderate fuel - proceed carefully" : "Adequate fuel supply";
      let altSuggestion = maxAlt > distance ? "Altitude exceeds distance - good!" : "Increase fuel for safety";
      let timeSuggestion = time < 60 ? "Quick mission - under 1 minute" : time < 300 ? "Standard duration" : "Extended flight - 5+ minutes";
      
      const peakTime = time / 2;
      let statusColor = status === "HIGH SUCCESS" ? "#4ade80" : status === "MEDIUM RISK" ? "#facc15" : "#f87171";
      
      let html = '<h4>📊 MISSION REPORT</h4>';
      html += '<div class="stat-item"><span class="stat-label">Fuel</span><div class="stat-value">' + fuel + ' kg</div></div>';
      html += '<div class="stat-item"><span class="stat-label">Delta-V</span><div class="stat-value">' + deltaV.toFixed(0) + ' m/s</div></div>';
      html += '<div class="stat-item"><span class="stat-label">Flight Time</span><div class="stat-value">' + time.toFixed(1) + ' sec</div></div>';
      html += '<div class="stat-item"><span class="stat-label">Max Altitude</span><div class="stat-value">' + maxAlt.toFixed(1) + ' km</div></div>';
      html += '<div class="stat-item"><span class="stat-label">Target Distance</span><div class="stat-value">' + distance + ' km</div></div>';
      html += '<div class="stat-item" style="margin-top: 15px; border-top: 1px solid #2d3748; padding-top: 15px;"><span class="stat-label">Status</span><div class="stat-value" style="font-size: 16px; color: ' + statusColor + ';">' + status + '</div></div>';
      html += '<div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #2d3748;">';
      html += '<div class="stat-item" style="border: none; padding: 0;"><span class="stat-label">Fuel Check</span><div class="stat-suggestion">' + fuelSuggestion + '</div></div>';
      html += '<div class="stat-item" style="border: none; padding: 8px 0 0 0;"><span class="stat-label">Altitude Check</span><div class="stat-suggestion">' + altSuggestion + '</div></div>';
      html += '<div class="stat-item" style="border: none; padding: 8px 0 0 0;"><span class="stat-label">Duration</span><div class="stat-suggestion">' + timeSuggestion + '</div></div>';
      html += '</div>';
      
      statsBox.innerHTML = html;
      
      // Show fuel box and calculate mixture recommendation
      const fuelBox = document.getElementById('fuelBox');
      const fuelContent = document.getElementById('fuelContent');
      fuelBox.style.display = 'block';
let mixtureName, ratio, efficiency, note;

if (deltaV >= 9400) {
    mixtureName = "LOX / LH₂";
    ratio = "5.5 : 1";
    efficiency = "450 s";
    note = "Highest performance cryogenic propellant.";
}
else if (deltaV >= 5000) {
    mixtureName = "LOX / CH₄";
    ratio = "3.6 : 1";
    efficiency = "360 s";
    note = "Modern reusable rocket propellant.";
}
else if (deltaV >= 3000) {
    mixtureName = "LOX / RP-1";
    ratio = "2.7 : 1";
    efficiency = "330 s";
    note = "Used by Falcon 9 first stage and Soyuz.";
}
else {
    mixtureName = "N₂O₄ / UDMH";
    ratio = "2.0 : 1";
    efficiency = "320 s";
    note = "Storable propellant for spacecraft.";
}
      
      let fuelHTML = '<div class="fuel-mixture-item">';
      fuelHTML += '<div class="mixture-label">' + mixtureName + '</div>';
      fuelHTML += '<div class="mixture-ratio">';
      fuelHTML += '<div class="ratio-item"><div class="ratio-label">Oxygen Ratio</div><div class="ratio-value">' + oxygenRatio + '%</div></div>';
      fuelHTML += '<div class="ratio-item"><div class="ratio-label">Hydrogen Ratio</div><div class="ratio-value">' + hydrogenRatio + '%</div></div>';
      fuelHTML += '<div class="ratio-item"><div class="ratio-label">Specific Impulse</div><div class="ratio-value">' + efficiency + '</div></div>';
      fuelHTML += '</div>';
      fuelHTML += '<div class="mixture-note">💡 ' + note + '</div>';
      fuelHTML += '</div>';
      
      fuelContent.innerHTML = fuelHTML;

      // Graph - FIXED: Set canvas height properly with scales and grid
      const canvas = document.getElementById('graph');
      const ctx = canvas.getContext('2d');
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
      
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Padding for axes - reduced for more graph space
      const padding = 40;
      const graphWidth = canvas.width - padding * 1.5;
      const graphHeight = canvas.height - padding * 1.5;
      const graphStartX = padding;
      const graphStartY = canvas.height - padding;
      
      // Draw grid lines with larger steps (cleaner separation)
      ctx.strokeStyle = '#d1d5db';
      ctx.lineWidth = 1.5;
      const gridSteps = 5;
      for (let i = 0; i <= gridSteps; i++) {
        const x = graphStartX + (i / gridSteps) * graphWidth;
        
        // Vertical grid line
        ctx.beginPath();
        ctx.moveTo(x, graphStartY);
        ctx.lineTo(x, padding * 0.5);
        ctx.stroke();
      }
      
      // Draw horizontal grid lines (lighter)
      ctx.strokeStyle = '#e5e7eb';
      ctx.lineWidth = 1;
      for (let i = 1; i < gridSteps; i++) {
        const y = graphStartY - (i / gridSteps) * graphHeight;
        
        ctx.beginPath();
        ctx.moveTo(graphStartX, y);
        ctx.lineTo(graphStartX + graphWidth, y);
        ctx.stroke();
      }
      
      // Draw axes
      ctx.strokeStyle = '#6b7280';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(graphStartX, graphStartY);
      ctx.lineTo(graphStartX, padding * 0.5);  // Y-axis
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(graphStartX, graphStartY);
      ctx.lineTo(canvas.width - padding * 0.5, graphStartY);  // X-axis
      ctx.stroke();
      
      // Draw time labels only (X-axis)
      ctx.fillStyle = '#374151';
      ctx.font = '13px Inter';
      ctx.textAlign = 'center';
      for (let i = 0; i <= gridSteps; i++) {
        const x = graphStartX + (i / gridSteps) * graphWidth;
        const timeValue = (i / gridSteps) * time;
        ctx.fillText(timeValue.toFixed(1) + 's', x, graphStartY + 25);
      }
      
      // Draw trajectory curve
      ctx.strokeStyle = '#2563eb';
      ctx.lineWidth = 3.5;
      ctx.beginPath();
      const steps = 150;
      const maxH = maxAlt;
      
      let peakX = 0, peakY = 0;
      
      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        const x = graphStartX + t * graphWidth;
        const altAtT = Math.sin(Math.PI * t) * maxAlt;
        const y = graphStartY - (altAtT / maxAlt) * graphHeight;
        
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
        
        // Track peak point
        if (i === Math.floor(steps / 2)) {
          peakX = x;
          peakY = y;
        }
      }
      ctx.stroke();
      
      // Draw peak point marker
      ctx.fillStyle = '#dc2626';
      ctx.beginPath();
      ctx.arc(peakX, peakY, 7, 0, Math.PI * 2);
      ctx.fill();
      
      // Draw peak label with value
      ctx.fillStyle = '#7f1d1d';
      ctx.font = 'bold 15px Inter';
      ctx.textAlign = 'center';
      ctx.fillText('Peak: ' + maxAlt.toFixed(1) + ' km', peakX, peakY - 22);
      
      // Draw axis title
      ctx.fillStyle = '#6b7280';
      ctx.font = '12px Inter';
      ctx.textAlign = 'center';
      ctx.fillText('Time (seconds)', canvas.width / 2, canvas.height - 8);
    }
  </script>
</body>
</html>
